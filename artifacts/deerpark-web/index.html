    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "DeerPark.io",
        "url": "https://www.deerpark.io",
        "description": "AI enablement for organizations. We assess, build, deploy, and train so the tools get adopted instead of shelved.",
        "email": "contact@deerpark.io",
        "logo": "https://www.deerpark.io/favicon-192.png"
      }
    </script>

    <!-- ProfessionalService schema. Source of truth: SERVICE_PILLARS in src/pages/home.tsx — keep in sync if pillars change. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "DeerPark.io",
        "url": "https://www.deerpark.io",
        "image": "https://www.deerpark.io/opengraph.jpg",
        "description": "AI enablement consultancy. We assess organizational readiness, build custom AI applications, deploy them with your team, and train your people to operate them — kickoff to handoff in roughly 90 days.",
        "areaServed": "Worldwide",
        "serviceType": "AI consulting, custom AI application development, AI training",
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "AI enablement services",
          "itemListElement": [
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Assess",
                "description": "AI Readiness Assessment, Workflow Diagnostic & Mapping, Tool & Vendor Evaluation."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Build",
                "description": "Custom AI Application Development, Process Automation, System Integration."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Deploy",
                "description": "Rollout & Change Management, Runbooks & Governance, 30-Day On-Call Support."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Train",
                "description": "Executive AI Briefings, Role-Based Workshops, Hands-On Team Enablement."
              }
            }
          ]
        }
      }
    </script>

    <!-- FAQPage schema. Source of truth: FAQ_ITEMS in src/pages/home.tsx — keep in sync if FAQs change. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Do you train our team, or just build the tool?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Both, and the training is not an afterthought. Every engagement includes executive briefings, role-based workshops, and hands-on training on the application we ship — scoped in week one and running alongside the build so your team is live the day we hand over."
            }
          },
          {
            "@type": "Question",
            "name": "Our team isn't technical. Is this for us?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. We work with organizations at every level of AI maturity. Our engagements are designed for operations, ops leadership, and domain teams — we handle the technical build, then train your people in plain language on the workflows they actually run."
            }
          },
          {
            "@type": "Question",
            "name": "Who owns the code and prompts?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "You do. We deliver everything in your repositories, on your cloud accounts, under your licenses. No per-seat AI tax and no DeerPark runtime dependency."
            }
          },
          {
            "@type": "Question",
            "name": "What about data security and compliance?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We deploy inside your VPC or cloud tenant, use your existing IAM, and route through vetted model providers. We have worked in FINRA-adjacent environments and on systems with healthcare and enterprise compliance requirements."
            }
          },
          {
            "@type": "Question",
            "name": "Which models do you use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Model-agnostic. We benchmark the top-tier frontier models plus one or two open-weight options against your actual evals and pick based on cost, latency, and accuracy — not brand."
            }
          },
          {
            "@type": "Question",
            "name": "What happens after the engagement ends?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Your team owns the system. We provide runbooks, eval suites, and a 30-day on-call window. Optional quarterly reviews are available but never required."
            }
          },
          {
            "@type": "Question",
            "name": "Do you replace my existing vendors?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Only if they are underperforming. Most engagements augment your current stack — we build the agents and glue, and keep you on the SaaS tools your team already trusts."
            }
          }
        ]
      }
    </script>
