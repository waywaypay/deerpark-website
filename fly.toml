# Fly.io config for @workspace/api-server.
#
# First deploy:
#   fly launch --copy-config --name deerpark-api --no-deploy
#   fly secrets set DATABASE_URL="postgres://..." INGEST_SECRET="$(openssl rand -hex 32)"
#   fly deploy
#
# Subsequent deploys:
#   fly deploy

app = "deerpark-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  HEADLINE_INGEST_INTERVAL_MIN = "15"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine alive so the in-process ingestion scheduler keeps running.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
