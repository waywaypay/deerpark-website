kind = "web"
previewPath = "/"
title = "Deerpark.io"
version = "1.0.0"
id = "artifacts/deerpark-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22388

[services.development]
run = "pnpm --filter @workspace/deerpark-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/deerpark-web", "run", "build" ]
publicDir = "artifacts/deerpark-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22388"
BASE_PATH = "/"
