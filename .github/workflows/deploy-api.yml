name: Deploy deerpark-api to Fly

# Auto-deploys the api-server (Fly app `deerpark-api`) on merges to main
# that touch the api-server itself or anything bundled into its image.
# Manual `workflow_dispatch` is also wired for one-off redeploys.
#
# Setup: requires repo secret `FLY_API_TOKEN`. Generate with
#   flyctl tokens create deploy --app deerpark-api
# then:
#   gh secret set FLY_API_TOKEN

on:
  push:
    branches: ["main"]
    paths:
      - "artifacts/api-server/**"
      - "lib/db/**"
      - "lib/api-zod/**"
      - "Dockerfile"
      - "fly.toml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "tsconfig.base.json"
      - "tsconfig.json"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

# Serialize deploys — Fly's release_command + machine rollout doesn't like
# overlapping pushes, and a queued newer commit will subsume an in-flight one.
concurrency:
  group: deploy-api
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        # Pinned to a SHA — `@master` is mutable and the next step uses
        # FLY_API_TOKEN, which can deploy any image to prod. Bump by
        # re-resolving the SHA for the latest release tag:
        #   gh api repos/superfly/flyctl-actions/git/refs/tags
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
